# WHY THIS FILE EXISTS: ServiceAccount for IRSA (IAM Roles for Service Accounts).
# The eks.amazonaws.com/role-arn annotation (set in values-dev/prod.yaml) allows
# the backend pod to assume an AWS IAM role without long-lived credentials.

{{- if and .Values.backend.enabled .Values.backend.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "webapp.backend.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "webapp.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
  {{- with .Values.backend.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
automountServiceAccountToken: true
{{- end }}
