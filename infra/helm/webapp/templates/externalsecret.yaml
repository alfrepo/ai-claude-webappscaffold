# WHY THIS FILE EXISTS: ExternalSecret fetches sensitive values from AWS Secrets Manager
# and materialises them as a native Kubernetes Secret.
# Requires External Secrets Operator: https://external-secrets.io/
# The SecretStore named by .Values.externalSecrets.secretStoreName must already exist.
# NEVER put actual secret values in values.yaml or this template.
# To add a new secret: add the key to spec.data and reference the AWS secret field.

{{- if .Values.externalSecrets.enabled }}
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ include "webapp.fullname" . }}-backend-secrets
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "webapp.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  refreshInterval: {{ .Values.backend.externalSecret.refreshInterval }}
  secretStoreRef:
    name: {{ .Values.externalSecrets.secretStoreName }}
    kind: SecretStore
  target:
    name: {{ include "webapp.fullname" . }}-backend-secrets
    creationPolicy: Owner
  data:
    - secretKey: DB_PASSWORD
      remoteRef:
        key: {{ .Values.backend.externalSecret.secretName }}
        property: DB_PASSWORD
    - secretKey: DB_USERNAME
      remoteRef:
        key: {{ .Values.backend.externalSecret.secretName }}
        property: DB_USERNAME
    - secretKey: DB_URL
      remoteRef:
        key: {{ .Values.backend.externalSecret.secretName }}
        property: DB_URL
    - secretKey: JWT_SECRET
      remoteRef:
        key: {{ .Values.backend.externalSecret.secretName }}
        property: JWT_SECRET
{{- end }}
