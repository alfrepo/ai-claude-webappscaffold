# WHY THIS FILE EXISTS: NetworkPolicy implements default-deny with explicit allow rules.
# Without this, all pods can communicate freely within the namespace.
# Rules: frontend → backend on 8080; backend → external (DB, AWS) on standard ports.
# To allow a new egress destination: add an egress rule to the backend policy.

{{- if .Values.networkPolicy.enabled }}
# ── Backend NetworkPolicy ─────────────────────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "webapp.fullname" . }}-backend
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "webapp.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  podSelector:
    matchLabels:
      {{- include "webapp.backend.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow traffic from the Ingress controller (nginx or ALB)
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
    # Allow traffic from the frontend pods (for direct backend calls)
    - from:
        - podSelector:
            matchLabels:
              {{- include "webapp.frontend.selectorLabels" . | nindent 14 }}
      ports:
        - protocol: TCP
          port: 8080
  egress:
    # Allow DNS resolution
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Allow PostgreSQL access (RDS or in-cluster)
    - ports:
        - protocol: TCP
          port: 5432
    # Allow HTTPS for AWS SDK calls (Secrets Manager, S3, etc.)
    - ports:
        - protocol: TCP
          port: 443
---
# ── Frontend NetworkPolicy ────────────────────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "webapp.fullname" . }}-frontend
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "webapp.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
spec:
  podSelector:
    matchLabels:
      {{- include "webapp.frontend.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow traffic from the Ingress controller only
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - protocol: TCP
          port: 80
  egress:
    # Allow DNS
    - ports:
        - protocol: UDP
          port: 53
{{- end }}
