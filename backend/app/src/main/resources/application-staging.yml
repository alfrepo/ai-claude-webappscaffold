# WHY THIS FILE EXISTS: Staging environment profile — mirrors production config.
# Staging uses real AWS services (not LocalStack).
# All values injected from environment — no values stored in this file.

spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2

  jpa:
    show-sql: false
    hibernate:
      ddl-auto: validate

logging:
  level:
    root: WARN
    com.example.webapp: INFO

# Disable Swagger UI in staging (API docs served via GitHub Pages instead)
springdoc:
  swagger-ui:
    enabled: false
  api-docs:
    enabled: false
