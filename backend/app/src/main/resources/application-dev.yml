# WHY THIS FILE EXISTS: Development environment profile.
# All values come from environment variables injected by ECS task definition.
# Secrets are retrieved from AWS Secrets Manager at startup — not stored here.
# See infra/modules/secrets-manager for the secret definitions.

spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    show-sql: false
    hibernate:
      ddl-auto: validate

logging:
  level:
    root: INFO
    com.example.webapp: DEBUG
