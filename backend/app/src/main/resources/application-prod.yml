# WHY THIS FILE EXISTS: Production environment profile.
# Zero tolerence for hardcoded values — everything from environment variables.
# Connection pool tuned for production load — adjust based on RDS instance class.
# Swagger UI disabled — API docs are published to GitHub Pages separately.

spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${DB_POOL_MAX:20}
      minimum-idle: ${DB_POOL_MIN:5}
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    show-sql: false
    hibernate:
      ddl-auto: validate

logging:
  level:
    root: WARN
    com.example.webapp: INFO

springdoc:
  swagger-ui:
    enabled: false
  api-docs:
    enabled: false

management:
  endpoint:
    health:
      show-details: never    # Never expose health details publicly in prod
