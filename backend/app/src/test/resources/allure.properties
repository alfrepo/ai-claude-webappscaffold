# WHY THIS FILE EXISTS: Configures the Allure JUnit 5 listener for backend tests.
# Results are written to target/allure-results/ and picked up by the CI 'allure:generate' job.
# To add a custom category (e.g., "Flaky Tests"): create categories.json alongside this file.
# allure-junit5 reads this file automatically from the test classpath.

allure.results.directory=target/allure-results
allure.link.issue.pattern=https://gitlab.example.com/{project}/issues/{}
allure.link.tms.pattern=https://gitlab.example.com/{project}/issues/{}
