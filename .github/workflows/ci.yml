# WHY THIS FILE EXISTS: Continuous Integration pipeline.
# Runs on every PR and every push to main. Blocks merge if any job fails.
# Jobs run in parallel where possible to minimize wall-clock time.
# To add a new check: add a new job and add it to the 'needs' list of the 'ci-pass' job.
# See CLAUDE.md for the full list of enforced quality gates.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  JAVA_VERSION: '21'
  NODE_VERSION: '20'

jobs:
  # ── Backend: Lint ─────────────────────────────────────────────────────────────
  backend-lint:
    name: Backend Lint (Checkstyle + SpotBugs)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Run Checkstyle
        working-directory: backend
        run: ./mvnw checkstyle:check -B --no-transfer-progress

      - name: Run SpotBugs
        working-directory: backend
        run: ./mvnw spotbugs:check -B --no-transfer-progress

  # ── Backend: Unit + Integration Tests ─────────────────────────────────────────
  backend-test:
    name: Backend Tests + JaCoCo Coverage
    runs-on: ubuntu-latest
    services:
      # Testcontainers manages its own container; this is only for reference
      docker:
        image: docker:dind
        options: --privileged
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Run tests with JaCoCo coverage check
        working-directory: backend
        run: ./mvnw verify -B --no-transfer-progress
        env:
          # Testcontainers uses the host Docker daemon
          TESTCONTAINERS_RYUK_DISABLED: 'true'

      - name: Upload JaCoCo reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-reports
          path: backend/**/target/site/jacoco/

      - name: Publish Coverage to PR
        uses: madrapps/jacoco-report@v1.6.1
        if: github.event_name == 'pull_request'
        with:
          paths: backend/app/target/site/jacoco/jacoco.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          min-coverage-overall: 80
          min-coverage-changed-files: 80

  # ── Frontend: Lint ─────────────────────────────────────────────────────────────
  frontend-lint:
    name: Frontend Lint (ESLint + Prettier)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run ESLint
        working-directory: frontend
        run: npm run lint

      - name: Check Prettier formatting
        working-directory: frontend
        run: npm run format:check

  # ── Frontend: Unit Tests ────────────────────────────────────────────────────
  frontend-test:
    name: Frontend Tests + Jest Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run Jest with coverage
        working-directory: frontend
        run: npm run test:ci

      - name: Upload Jest coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jest-coverage
          path: frontend/coverage/

  # ── E2E: Playwright + Cucumber BDD ─────────────────────────────────────────
  e2e:
    name: E2E Tests (Playwright + Cucumber)
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-test]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Set up Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Start application stack
        run: docker compose up --build -d
        env:
          COMPOSE_FILE: docker-compose.yml

      - name: Wait for backend health
        run: |
          timeout 120 bash -c 'until curl -sf http://localhost:8080/actuator/health; do sleep 3; done'

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Run Playwright E2E tests
        working-directory: frontend
        run: npm run e2e
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:4200
          CI: 'true'

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: frontend/playwright-report/

      - name: Stop application stack
        if: always()
        run: docker compose down

  # ── OWASP Dependency Check ───────────────────────────────────────────────────
  security-scan:
    name: OWASP Dependency Check (CVSS ≥ 7 fails build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Run OWASP Dependency Check
        working-directory: backend
        run: ./mvnw dependency-check:check -B --no-transfer-progress
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}

      - name: Upload OWASP report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: owasp-report
          path: backend/**/target/dependency-check-report.html

  # ── Publish OpenAPI Docs ─────────────────────────────────────────────────────
  publish-api-docs:
    name: Publish OpenAPI Docs to GitHub Pages
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    needs: [backend-test]
    permissions:
      pages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Generate Redoc HTML
        run: |
          npx @redocly/cli build-docs \
            backend/api/src/main/resources/openapi.yaml \
            --output docs/api/index.html

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/api

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4

  # ── Required Status Check ─────────────────────────────────────────────────────
  # This job aggregates all required checks — add its name as the required branch protection rule.
  ci-pass:
    name: CI Passed
    runs-on: ubuntu-latest
    needs: [backend-lint, backend-test, frontend-lint, frontend-test, e2e, security-scan]
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          if [[ "${{ needs.backend-lint.result }}" != "success" ]] || \
             [[ "${{ needs.backend-test.result }}" != "success" ]] || \
             [[ "${{ needs.frontend-lint.result }}" != "success" ]] || \
             [[ "${{ needs.frontend-test.result }}" != "success" ]] || \
             [[ "${{ needs.e2e.result }}" != "success" ]] || \
             [[ "${{ needs.security-scan.result }}" != "success" ]]; then
            echo "One or more required CI jobs failed"
            exit 1
          fi
          echo "All CI checks passed"
